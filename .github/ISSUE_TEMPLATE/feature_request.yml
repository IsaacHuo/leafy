name: Feature request
description: Suggest a small product or engineering improvement.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user need or engineering problem does this address?
      placeholder: Students need a faster way to...
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the smallest useful version of the change.
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: Which parts of the project are affected?
      placeholder: iOS app, widgets, Supabase, website, admin console, docs
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Optional. Note any simpler workaround or rejected approach.
