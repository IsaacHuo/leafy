name: Bug report
description: Report a reproducible problem in the app, website, or backend.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is broken?
      placeholder: Timetable import fails after login.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Write the shortest path that reproduces the problem.
      placeholder: |
        1. Open ...
        2. Tap ...
        3. See ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What happened instead?
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: Device, iOS version, app build, browser, or backend environment.
      placeholder: iPhone 15, iOS 26.0, TestFlight 1.0.0
  - type: textarea
    id: notes
    attributes:
      label: Notes
      description: Screenshots, logs, or related links. Do not include passwords, tokens, cookies, or private student data.
