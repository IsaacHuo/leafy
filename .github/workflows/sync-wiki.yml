name: Sync Wiki

on:
  push:
    branches:
      - main
    paths:
      - "wiki/**"
      - ".github/workflows/sync-wiki.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-wiki
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Publish Wiki pages
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          wiki_dir="$(mktemp -d)"
          git clone "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.wiki.git" "$wiki_dir"
          find "$wiki_dir" -maxdepth 1 -type f -name '*.md' -delete
          cp wiki/*.md "$wiki_dir"/
          git -C "$wiki_dir" config user.name "github-actions[bot]"
          git -C "$wiki_dir" config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git -C "$wiki_dir" add --all
          if git -C "$wiki_dir" diff --cached --quiet; then
            exit 0
          fi
          git -C "$wiki_dir" commit -m "Sync Wiki from ${GITHUB_SHA}"
          git -C "$wiki_dir" push origin HEAD:master

