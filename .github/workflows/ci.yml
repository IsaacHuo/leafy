name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  repository-hygiene:
    name: Repository hygiene
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate PR branch name
        if: github.event_name == 'pull_request'
        shell: bash
        run: |
          branch="${GITHUB_HEAD_REF}"
          pattern='^(feature|fix|docs|chore|refactor|test|release|codex)/[a-z0-9][a-z0-9._-]*$'
          if [[ ! "${branch}" =~ ${pattern} ]]; then
            echo "Invalid branch name: ${branch}"
            echo "Use feature/, fix/, docs/, chore/, refactor/, test/, release/, or codex/ followed by a lowercase slug."
            exit 1
          fi

      - name: Check for non-public tracked files
        shell: bash
        run: |
          banned='(^stargazer/|^marketing/|^admin-console/|^微信公众号文案/|^\.codex/|^supabase/\.temp/|^testPython.*\.py$|^test.*\.swift$|^test_.*\.swift$|(^|/)xcuserdata/|\.xcuserstate$|\.DS_Store$|\.mobileprovision$|GoogleService-Info\.plist$|ServiceAccount.*\.json$|\.p8$|\.p12$|\.pem$|\.key$)'
          if git ls-files | grep -E "${banned}"; then
            echo "Tracked non-public files were found. Remove them before merging."
            exit 1
          fi

      - name: Check for obvious secret patterns
        shell: bash
        run: |
          secret_patterns='(AKIA|ASIA)[0-9A-Z]{16}|gh[pousr]_[0-9A-Za-z_]{20,}|github_pat_[0-9A-Za-z_]{20,}|sk-[A-Za-z0-9_-]{20,}|AIza[0-9A-Za-z_-]{20,}|BEGIN (RSA |DSA |EC |OPENSSH |PGP )?PRIVATE KEY|eyJ[A-Za-z0-9_-]{20,}\.[A-Za-z0-9_-]{20,}\.[A-Za-z0-9_-]{20,}'
          if git grep -I -n -E "${secret_patterns}" -- .; then
            echo "Possible secret found. Remove it and rotate the credential if it was real."
            exit 1
          fi

  site:
    name: Website build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: site
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check website and admin
        run: npm run typecheck

      - name: Run website and admin unit tests
        run: npm test

      - name: Build website
        run: npm run build

  site-e2e:
    name: Website browser tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: site
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium webkit

      - name: Run Chromium and WebKit tests
        run: npm run test:e2e

  supabase-functions:
    name: Supabase function contracts
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Check all Edge Functions
        shell: bash
        run: |
          mapfile -t entrypoints < <(find supabase/functions -name '*.ts' -type f | sort)
          deno check "${entrypoints[@]}"

      - name: Run all Edge Function tests
        run: deno test --allow-env --allow-read supabase/functions

      - name: Verify migration contracts
        run: bash supabase/tests/verify_admin_security_runtime_migration.sh

  supabase-database:
    name: Supabase database tests
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start local Supabase
        run: supabase start -x studio,imgproxy,inbucket,edge-runtime,logflare,vector,supavisor

      - name: Reset database from migrations
        run: supabase db reset --local

      - name: Replay admin migrations
        shell: bash
        run: |
          database_container=$(docker ps --filter 'name=supabase_db_' --format '{{.ID}}' | head -n 1)
          if [[ -z "${database_container}" ]]; then
            echo 'Local Supabase database container was not found.'
            exit 1
          fi
          docker exec -i "${database_container}" \
            psql -U postgres -d postgres -v ON_ERROR_STOP=1 \
            < supabase/migrations/20260710121000_admin_security_runtime.sql
          docker exec -i "${database_container}" \
            psql -U postgres -d postgres -v ON_ERROR_STOP=1 \
            < supabase/migrations/20260722160000_admin_backend_hardening.sql

      - name: Run database tests
        run: supabase test db

  ios-tests:
    name: iOS build and tests
    runs-on: macos-latest
    timeout-minutes: 45
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Resolve Swift packages
        run: xcodebuild -resolvePackageDependencies -project leafy.xcodeproj -scheme leafy

      - name: Build for the iOS 17 deployment target
        run: |
          xcodebuild build \
            -project leafy.xcodeproj \
            -scheme leafy \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            IPHONEOS_DEPLOYMENT_TARGET=17.0 \
            CODE_SIGNING_ALLOWED=NO

      - name: Select an available iPhone simulator
        shell: bash
        run: |
          destination=$(xcodebuild -showdestinations -project leafy.xcodeproj -scheme leafy \
            | sed -n 's/.*platform:iOS Simulator, arch:[^,]*, id:\([^,]*\), OS:\([^,]*\), name:iPhone[^}]*/platform=iOS Simulator,id=\1/p' \
            | head -n 1)
          if [[ -z "${destination}" ]]; then
            echo 'No available iPhone Simulator destination was found.'
            xcodebuild -showdestinations -project leafy.xcodeproj -scheme leafy
            exit 1
          fi
          echo "IOS_TEST_DESTINATION=${destination}" >> "${GITHUB_ENV}"

      - name: Run the complete iOS test suite
        run: |
          mkdir -p TestResults
          xcodebuild test \
            -project leafy.xcodeproj \
            -scheme leafy \
            -configuration Debug \
            -destination "${IOS_TEST_DESTINATION}" \
            -parallel-testing-enabled NO \
            -resultBundlePath TestResults/leafy.xcresult \
            CODE_SIGNING_ALLOWED=NO

      - name: Upload iOS test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: leafy-ios-test-results
          path: TestResults/leafy.xcresult
          if-no-files-found: ignore
