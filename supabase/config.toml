project_id = "<project-ref>"

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 17

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = []
jwt_expiry = 3600
enable_signup = true
enable_anonymous_sign_ins = true

[auth.email]
otp_length = 8
otp_expiry = 3600

[auth.email.template.email_change]
subject = "MyLeafy 绑定邮箱验证码"
content_path = "./supabase/templates/email-change-otp.html"

[edge_runtime]
enabled = true
policy = "oneshot"
inspector_port = 8083
deno_version = 2

[functions.community-bootstrap-user]
verify_jwt = false

[functions.community-feed]
verify_jwt = false

[functions.campus-request]
verify_jwt = false

[functions.share-preview]
verify_jwt = false

[functions.campus-weather]
verify_jwt = false

[functions.app-store-server-notifications]
verify_jwt = false

[functions.admin-publish-announcement]
verify_jwt = false

[functions.admin-list-announcements]
verify_jwt = false

[functions.admin-update-announcement]
verify_jwt = false

[functions.admin-login]
verify_jwt = false

[functions.admin-me]
verify_jwt = false

[functions.admin-logout]
verify_jwt = false

[functions.admin-community]
verify_jwt = false
