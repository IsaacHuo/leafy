<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>MyLeafy 绑定邮箱验证码</title>
  </head>
  <body style="margin: 0; background: #f4f7f5; color: #18221d; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;">
    <main style="max-width: 560px; margin: 0 auto; padding: 32px 20px;">
      <section style="background: #ffffff; border: 1px solid #d9e1dc; border-radius: 8px; padding: 28px;">
        <p style="margin: 0 0 20px; color: #2d6b4d; font-size: 20px; font-weight: 700;">MyLeafy</p>
        <h1 style="margin: 0 0 16px; font-size: 22px; line-height: 1.35;">绑定邮箱验证码</h1>
        <p style="margin: 0 0 12px; font-size: 15px; line-height: 1.65;">你正在将 <strong>{{ .NewEmail }}</strong> 绑定为 MyLeafy 的通知邮箱。</p>
        <p style="margin: 0 0 20px; font-size: 15px; line-height: 1.65;">请回到 MyLeafy App，在“绑定邮箱”页面输入以下验证码：</p>
        <p style="margin: 0 0 20px; padding: 16px; border-radius: 6px; background: #edf6f0; color: #165c3b; font-size: 28px; font-weight: 700; letter-spacing: 4px; text-align: center;">{{ .Token }}</p>
        <p style="margin: 0; color: #58645d; font-size: 13px; line-height: 1.6;">验证码 1 小时内有效。请勿将验证码提供给他人；如非本人操作，可直接忽略此邮件。</p>
      </section>
    </main>
  </body>
</html>
